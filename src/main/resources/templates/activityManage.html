<!DOCTYPE html>
<html class="x-admin-sm" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>团队活动管理</title>
    <meta content="webkit" name="renderer">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" name="viewport"/>
    <link rel="stylesheet" th:href="@{/css/xadmin.css}">
    <link rel="stylesheet" th:href="@{/css/font.css}">
    <script charset="utf-8" th:src="@{/js/jquery.min.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/layui/layui.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/js/xadmin.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/js/vue.js}" type="text/javascript"></script>
</head>

<body>
<div class="x-nav">
            <span class="layui-breadcrumb">
                <a target="_top" th:href="@{/index}">首页</a>
            </span>
    <a class="layui-btn layui-btn-small" onclick="location.reload()"
       style="line-height:1.6em;margin-top:3px;float:right" title="刷新">
        <i class="layui-icon layui-icon-refresh" style="line-height:30px"></i>
    </a>
</div>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12" id="vmActivity">
            <div class="layui-card">

                <div class="layui-card-header">
                    <button class="layui-btn" onclick="xadmin.open('添加团队活动','/activityAdd',500,700)">
                        <i class="layui-icon"></i>添加团队活动
                    </button>
                </div>
                <div class="layui-card-body">
                    <table class="layui-table layui-form">
                        <thead>
                        <tr>
                            <th>序号</th>
                            <th>团队名</th>
                            <th>活动名称</th>
                            <th>活动内容</th>
                            <th>活动开始时间</th>
                            <th>总预算</th>
                            <th>个人预算</th>
                            <th>总费用</th>
                            <th>分摊费用</th>
                            <th>活动结束时间</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr v-for="activity,i in pageInfo.list">
                            <td v-text="i+1"></td>
                            <td v-text="activity.teamName"></td>
                            <td v-text="activity.name"></td>
                            <td v-text="activity.content"></td>
                            <td v-text="activity.startTime"></td>
                            <td v-text="activity.budget"></td>
                            <td v-text="activity.avgBudget"></td>
                            <td v-text="activity.amount"></td>
                            <td v-text="activity.avgFee"></td>
                            <td v-text="activity.endTime"></td>
                            <td class="td-manage">
                                <button @click="editActivity(activity.id)"
                                        class="layui-btn layui-btn-warm"
                                        id="editActivity"
                                        onclick="xadmin.open('结束活动','/activityEdit',500,700)">
                                    <i class="layui-icon">&#xe631;</i>结束活动
                                </button>
                                <button @click="updateActivityUser(activity.id)"
                                        class="layui-btn layui-btn-warm"
                                        onclick="xadmin.open('活动人员管理','/activityUserManage', 1200,1000,true)">
                                    <i class="layui-icon"></i>活动人员管理
                                </button>
                                <button @click="addActivityFee(activity.id)"
                                        class="layui-btn layui-btn-warm"
                                        onclick="xadmin.open('活动费用追加','/appendAdd',500,700)">
                                    <i class="layui-icon"></i>活动费用追加
                                </button>
                                <button @click="delActivity(activity.id)"
                                        class="layui-btn layui-btn-danger"
                                        id="delActivity">
                                    <i class="layui-icon">&#xe640;</i>删除
                                </button>
                            </td>
                        </tr>
                        <tr v-if="pageInfo.total == 0">
                            <td colspan="100" style="text-align: center">暂无团队活动信息！</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="layui-card-body" v-if="pageInfo.total != 0">
                    <div class="page">
                        <div>
                            <a @click="getPage(pageInfo.firstPage)" class="prev" href="javascript:void(0)">
                                首页
                            </a>
                            <a @click="getPage(pageInfo.prePage)" class="prev" href="javascript:void(0)"
                               v-if="pageInfo.hasPreviousPage">
                                上一页
                            </a>
                            <span @click="getPage(pageInfo.pageNum)" class="current">{{pageInfo.pageNum}} / {{pageInfo.pages}}</span>
                            <a @click="getPage(pageInfo.nextPage)" class="next" href="javascript:void(0)"
                               v-if="pageInfo.hasNextPage">
                                下一页
                            </a>
                            <a @click="getPage(pageInfo.lastPage)" class="prev" href="javascript:void(0)"
                               v-if="!pageInfo.isLastPage">
                                末页
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
<script type="text/javascript">

    var teamActivityManageTeamId = sessionStorage.getItem("teamActivityManageTeamId");

    vm = new Vue({
        el: "#vmActivity",
        data: {
            pageInfo: {}
        },
        methods: {
            getPage: function (pageNum, pageSize) {
                var _this = this;
                var url = "/activity/page?pageNum=" + pageNum;

                if (!pageSize) {
                    url += "&pageSize=" + _this.pageInfo.pageSize;
                } else {
                    url += "&pageSize=" + pageSize;
                }
                url += "&teamId=" + teamActivityManageTeamId;

                $.getJSON(url, function (data) {
                    _this.pageInfo = data;
                });
            },
            /**
             * 删除团队活动
             */
            delActivity: function (id) {
                layer.confirm('确认要删除吗？',
                    function () {
                        //发异步删除数据
                        $.ajax({
                            url: "/activity/deleteById",
                            data: {
                                id: id
                            },
                            dataType: "json",
                            type: "delete",
                            success: function (result) {
                                if (result.code === 200) {
                                    layer.msg('删除成功', {
                                        icon: 1,
                                        time: 1000
                                    });
                                    setTimeout(function () {
                                        window.location.reload();
                                    }, 1000);
                                } else {
                                    layer.alert(result.msg, {icon: 5});
                                }
                            }
                        });

                    });
            },
            /**
             *
             * 修改团队活动
             */
            editActivity: function (editActivityId) {
                //把要修改的editActivityId存到sessionStorage中
                sessionStorage.setItem("editActivityId", editActivityId);
            },
            /**
             * 修改团队活动人员
             */
            updateActivityUser: function (updateActivityUserId) {
                //把要修改的updateActivityUserId存到sessionStorage中
                sessionStorage.setItem("updateActivityUserId", updateActivityUserId);
            },
            /**
             * 修改团队活动费用
             */
            addActivityFee: function (addActivityFeeId) {
                //把要修改的addActivityFeeId存到sessionStorage中
                sessionStorage.setItem("addActivityFeeId", addActivityFeeId);
            }
        },
        created: function () {
            this.getPage(1, 5);
        }
    });

    layui.use(['form'], function () {
    });

</script>
</html>
