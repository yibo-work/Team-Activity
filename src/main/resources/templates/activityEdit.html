<!DOCTYPE html>
<html class="x-admin-sm" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>活动结算</title>
    <meta content="webkit" name="renderer">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" name="viewport"/>
    <link rel="stylesheet" th:href="@{/css/xadmin.css}">
    <link rel="stylesheet" th:href="@{/css/font.css}">
    <script charset="utf-8" th:src="@{/js/jquery.min.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/layui/layui.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/js/xadmin.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/js/vue.js}" type="text/javascript"></script>
</head>
<body>
<div class="layui-fluid" id="vmUpdateActivity">
    <div class="layui-row">
        <form class="layui-form">
            <div class="layui-form-item">
                <label class="layui-form-label" for="name">
                    <span class="x-red">*</span>活动名称
                </label>
                <div class="layui-input-block">
                    <div class="layui-input-inline layui-show-xs-block">
                        <input class="layui-input" id="name" lay-verify="required" name="name" type="text"
                               v-model="activity.name"></div>
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label" for="content">
                    <span class="x-red">*</span>活动内容
                </label>
                <div class="layui-input-block">
                    <div class="layui-input-inline layui-show-xs-block">
                        <textarea class="layui-textarea" id="content" lay-verify="required" name="content" rows="4"
                                  v-model="activity.content"></textarea></div>
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label" for="startTime">
                    <span class="x-red">*</span>活动开始时间
                </label>
                <div class="layui-input-block">
                    <div class="layui-input-inline layui-show-xs-block">
                        <input class="layui-input" id="startTime" lay-verify="required" name="startTime" type="text"
                               v-model="activity.startTime"></div>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label" for="budget">
                    <span class="x-red">*</span>总预算
                </label>
                <div class="layui-input-block">
                    <div class="layui-input-inline layui-show-xs-block">
                        <input class="layui-input" id="budget" lay-verify="required" name="budget" type="text"
                               v-model="activity.budget"></div>
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label" for="avgBudget">
                    <span class="x-red">*</span>个人预算
                </label>
                <div class="layui-input-block">
                    <div class="layui-input-inline layui-show-xs-block">
                        <input class="layui-input" id="avgBudget" lay-verify="required" name="avgBudget" type="text"
                               v-model="activity.avgBudget"></div>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label" for="amount">
                    <span class="x-red">*</span>总消费
                </label>
                <div class="layui-input-block">
                    <div class="layui-input-inline layui-show-xs-block">
                        <input class="layui-input" id="amount" lay-verify="required" name="amount" type="text"
                               v-model="activity.amount"></div>
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label"></label>
                <button class="layui-btn" lay-filter="edit" lay-submit="">
                    确认修改
                </button>
            </div>
        </form>
    </div>
</div>
<script charset="UTF-8" type="text/javascript">

    var editActivityId = sessionStorage.getItem("editActivityId");

    vm = new Vue({
        el: "#vmUpdateActivity",
        data: {
            activity: {}
        },
        methods: {},
        created: function () {
            var _this = this;
            $.ajax({
                url: "/activity/findById",
                data: {
                    "id": editActivityId
                },
                dataType: "json",
                type: "get",
                success: function (result) {
                    if (result.code === 200) {
                        _this.activity = result.data;
                    } else {
                        layer.alert("获取修改活动表信息失败！");
                    }
                }
            });

        }
    });

    layui.use(['form', 'layer', 'laydate'],
        function () {
            var form = layui.form,
                layer = layui.layer,
                laydate = layui.laydate;

            //监听提交
            form.on('submit(edit)',
                function (data) {

                    //组装数据
                    data.field.id = editActivityId;

                    //发异步，把数据提交给controller
                    $.ajax({
                        url: "activity/update",
                        data: JSON.stringify(data.field),
                        dataType: "json",
                        contentType: "application/json",
                        type: "put",
                        success: function (result) {
                            if (result.code === 200) {
                                layer.msg("修改成功", {icon: 6, time: 500},
                                    function () {
                                        //关闭当前frame
                                        xadmin.close();
                                        // 可以对父窗口进行刷新
                                        xadmin.father_reload();
                                    });
                            } else {
                                layer.alert(result.msg);
                            }
                        }
                    });

                    return false;
                });

        });
</script>
</body>
</html>
