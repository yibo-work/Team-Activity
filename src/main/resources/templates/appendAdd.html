<!DOCTYPE html>
<html class="x-admin-sm" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>添加活动追加费用</title>
    <meta content="webkit" name="renderer">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" name="viewport"/>
    <link rel="stylesheet" th:href="@{/css/xadmin.css}">
    <link rel="stylesheet" th:href="@{/css/font.css}">
    <script charset="utf-8" th:src="@{/js/jquery.min.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/layui/layui.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/js/xadmin.js}" type="text/javascript"></script>
    <script charset="utf-8" th:src="@{/js/vue.js}" type="text/javascript"></script>
</head>
<body>
<div class="layui-fluid">
    <div class="layui-row">
        <form class="layui-form">
            <div class="layui-form-item">
                <label class="layui-form-label" for="userId">
                    <span class="x-red">*</span>队员
                </label>
                <div class="layui-input-block">
                    <div class="layui-input-inline layui-show-xs-block">
                        <select id="userId" name="userId">
                            <option :value="user.id" v-for="user,index in activityFeeList">{{user.name}}</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label" for="appendFee">
                    <span class="x-red">*</span>追加费用
                </label>
                <div class="layui-input-block">
                    <div class="layui-input-inline layui-show-xs-block">
                        <input class="layui-input" id="appendFee" name="appendFee"
                               type="text">
                    </div>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label"></label>
                <button class="layui-btn" lay-filter="add" lay-submit="">
                    确认添加
                </button>
            </div>
        </form>
    </div>
</div>
<script charset="UTF-8" type="text/javascript">

    var addActivityFeeId = sessionStorage.getItem("addActivityFeeId");
    var teamActivityManageTeamId = sessionStorage.getItem("teamActivityManageTeamId");
    var addFeeActivity = {};
    vm = new Vue({
        el: "#vmAddActivityFee",
        data: {
            activityFeeList: []
        },
        created: function () {
            var _this = this;
            $.ajax({
                url: "/user/getAddActivityFeeList?teamId=" + teamActivityManageTeamId + "&activityId=" + addActivityFeeId,
                dataType: "json",
                type: "get",
                success: function (result) {
                    if (result.code === 200) {
                        _this.activityFeeList = result.data;
                    } else {
                        layer.alert("获取失败！");
                    }
                }
            });
            $.ajax({
                url: "/activity/findById",
                data: {
                    "id": addActivityFeeId
                },
                dataType: "json",
                type: "get",
                success: function (result) {
                    if (result.code === 200) {
                        addFeeActivity = result.data;
                    } else {
                        layer.alert("获取修改团队信息失败！");
                    }
                }
            });
        }
    });


    layui.use(['form', 'layer'],
        function () {
            var form = layui.form,
                layer = layui.layer;

            //监听提交
            form.on('submit(add)',
                function (data) {
                    //发异步，把数据提交给java
                    $.ajax({
                        url: "/append/save",
                        data: JSON.stringify(data.field),
                        dataType: "json",
                        type: "post",
                        contentType: "application/json",
                        success: function (result) {
                            if (result.code === 200) {
                                layer.msg("增加成功", {icon: 6, time: 500},
                                    function () {

                                        /*//发异步，把数据提交给controller
                                        $.ajax({
                                            url: "activity/update",
                                            data: JSON.stringify(addFeeActivity),
                                            dataType: "json",
                                            contentType: "application/json",
                                            type: "put",
                                            success: function (result) {
                                                if (result.code === 200) {
                                                    layer.msg("交纳团费成功", {icon: 6, time: 500},
                                                        function () {
                                                            //关闭当前frame
                                                            xadmin.close();
                                                            // 可以对父窗口进行刷新
                                                            xadmin.father_reload();
                                                        });
                                                } else {
                                                    layer.alert(result.msg);
                                                }
                                            }
                                        });*/

                                        //关闭当前frame
                                        xadmin.close();
                                        // 可以对父窗口进行刷新
                                        xadmin.father_reload();
                                    });
                            } else {
                                layer.alert(result.msg);
                            }
                        }
                    });

                    return false;
                });

        });
</script>
</body>
</html>
